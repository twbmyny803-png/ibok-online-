<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - iBOK</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #eef3f9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: #ffffff;
            max-width: 400px;
            width: 100%;
            padding: 30px 25px 25px;
            border-radius: 24px;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.12);
            text-align: center;
        }

        /* الرابط العلوي */
        .url-bar {
            font-size: 13px;
            color: #1a73e8;
            background: #f0f5ff;
            padding: 8px 14px;
            border-radius: 20px;
            display: inline-block;
            margin-bottom: 16px;
            font-weight: 500;
        }

        .sub-url {
            font-size: 13px;
            color: #555;
            margin-top: -6px;
            margin-bottom: 18px;
        }

        .sub-url span {
            color: #1a73e8;
            font-weight: 500;
        }

        /* شعار iBOK */
        .logo {
            font-size: 36px;
            font-weight: 800;
            color: #003366;
            letter-spacing: 1px;
        }

        .logo span {
            color: #c9a84b;
        }

        .sub-logo {
            font-size: 14px;
            color: #666;
            margin-top: 2px;
            font-weight: 500;
        }

        .welcome {
            font-size: 20px;
            font-weight: 600;
            color: #003366;
            margin-top: 22px;
            margin-bottom: 20px;
        }

        /* خط فاصل ذهبي */
        .divider {
            width: 50px;
            height: 3px;
            background: #c9a84b;
            margin: 0 auto 24px;
            border-radius: 10px;
        }

        .form-group {
            text-align: right;
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            font-size: 16px;
            font-weight: 700;
            color: #003366;
            margin-bottom: 6px;
        }

        .form-group input {
            width: 100%;
            padding: 13px 16px;
            font-size: 15px;
            border: 2px solid #dce3ed;
            border-radius: 14px;
            background: #f8faff;
            transition: 0.3s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #003366;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(0, 51, 102, 0.08);
        }

        .form-group .example {
            font-size: 13px;
            color: #888;
            margin-top: 4px;
            text-align: right;
        }

        .forgot-link {
            display: block;
            text-align: left;
            font-size: 14px;
            color: #003366;
            text-decoration: none;
            font-weight: 500;
            margin: 2px 0 20px;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: #003366;
            color: #fff;
            font-size: 18px;
            font-weight: 700;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 6px 20px rgba(0, 51, 102, 0.3);
        }

        .btn-login:hover {
            background: #002244;
            transform: scale(1.01);
        }

        .footer {
            margin-top: 24px;
            font-size: 13px;
            color: #888;
            border-top: 1px solid #eef2f7;
            padding-top: 18px;
        }

        .footer strong {
            color: #003366;
        }

        .footer .copy {
            display: block;
            margin-top: 3px;
            color: #aaa;
            font-size: 12px;
        }

        @media (max-width: 480px) {
            .card {
                padding: 22px 16px;
            }
            .logo {
                font-size: 30px;
            }
        }
    </style>
</head>
<body>

    <div class="card">

        <!-- رابط الموقع (كما في الصورة الثانية) -->
        <div class="url-bar">🔗 iBOK-online.onrender.com</div>
        <div class="sub-url">
            الخدمات المصرفية عبر الإنترنت<br>
            <span>ibok-online.com</span>
        </div>

        <!-- شعار iBOK -->
        <div class="logo">i<span>BOK</span></div>
        <div class="sub-logo">Internet Banking Services</div>

        <!-- ترحيب -->
        <div class="welcome">مرحباً بكم في خدمة iBOK</div>
        <div class="divider"></div>

        <!-- نموذج -->
        <form action="#" method="POST">
            <div class="form-group">
                <label>رقم الحساب</label>
                <input type="text" placeholder="أدخل رقم الحساب المكون من 7 أرقام" maxlength="7">
                <div class="example">مثال: 1234567</div>
            </div>

            <div class="form-group">
                <label>كلمة المرور</label>
                <input type="password" placeholder="أدخل كلمة المرور">
            </div>

            <a href="#" class="forgot-link">🔑 نسبت كلمة المرور</a>

            <button type="submit" class="btn-login">تسجيل الدخول</button>
        </form>

        <!-- تذييل -->
        <div class="footer">
            <strong>iBOK</strong> | 2025
            <span class="copy">جميع الحقوق محفوظة ©</span>
        </div>

    </div>

</body>
</html>
