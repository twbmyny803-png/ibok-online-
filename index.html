<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iBOK - تسجيل الدخول</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #eef3f9;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .card {
            background: #ffffff;
            max-width: 400px;
            width: 100%;
            padding: 30px 25px 25px;
            border-radius: 28px;
            box-shadow: 0 15px 45px rgba(0, 20, 40, 0.15);
            text-align: center;
        }

        /* الرابط العلوي - مطابق للصورة */
        .site-url {
            font-size: 15px;
            font-weight: 600;
            color: #1a3a6b;
            margin-bottom: 4px;
            letter-spacing: 0.3px;
        }

        .service-ar {
            font-size: 14px;
            color: #444;
            font-weight: 500;
            margin-top: 2px;
        }

        .service-en {
            font-size: 13px;
            color: #777;
            font-weight: 400;
            margin-top: -2px;
            margin-bottom: 18px;
        }

        /* النص الترحيبي الطويل كما في الصورة */
        .welcome-text {
            font-size: 18px;
            font-weight: 600;
            color: #003366;
            line-height: 1.6;
            margin-bottom: 18px;
        }

        /* عنوان تسجيل الدخول */
        .main-title {
            font-size: 26px;
            font-weight: 800;
            color: #003366;
            margin-bottom: 2px;
        }

        .sub-title {
            font-size: 18px;
            font-weight: 600;
            color: #1a3a6b;
            margin-bottom: 22px;
        }

        /* الحقول */
        .form-group {
            text-align: right;
            margin-bottom: 16px;
        }

        .form-group .field-label {
            display: block;
            font-size: 16px;
            font-weight: 700;
            color: #003366;
            margin-bottom: 2px;
        }

        .form-group .field-hint {
            display: block;
            font-size: 14px;
            color: #555;
            margin-bottom: 6px;
            font-weight: 400;
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            font-size: 15px;
            border: 2px solid #dce3ed;
            border-radius: 14px;
            background: #f8faff;
            transition: 0.3s;
            outline: none;
            text-align: right;
        }

        .form-group input:focus {
            border-color: #003366;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(0, 51, 102, 0.08);
        }

        /* رابط نسبت كلمة المرور (بدون رمز) */
        .forgot-link {
            display: block;
            text-align: right;
            font-size: 15px;
            color: #003366;
            text-decoration: none;
            font-weight: 600;
            margin: 6px 0 22px;
            cursor: pointer;
        }

        .forgot-link:hover {
            text-decoration: underline;
        }

        /* زر تسجيل الدخول */
        .btn-login {
            width: 100%;
            padding: 15px;
            background: #003366;
            color: #fff;
            font-size: 19px;
            font-weight: 700;
            border: none;
            border-radius: 30px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 6px 20px rgba(0, 51, 102, 0.25);
            letter-spacing: 0.5px;
        }

        .btn-login:hover {
            background: #002244;
            transform: scale(1.01);
        }

        /* التذييل - 2025 | iBOK */
        .footer {
            margin-top: 26px;
            font-size: 15px;
            font-weight: 600;
            color: #888;
            border-top: 1px solid #eef2f7;
            padding-top: 18px;
        }

        .footer strong {
            color: #003366;
            font-weight: 800;
        }

        .footer .pipe {
            color: #c9a84b;
            margin: 0 4px;
        }

        @media (max-width: 480px) {
            .card {
                padding: 20px 16px;
            }
            .main-title {
                font-size: 22px;
            }
            .welcome-text {
                font-size: 16px;
            }
        }
    </style>
</head>
<body>

    <div class="card">

        <!-- النصوص العلوية كما في الصورة -->
        <div class="site-url">ibok-online.com</div>
        <div class="service-ar">الخدمات المصرفية عبر الإنترنت</div>
        <div class="service-en">Internet Banking Services</div>

        <!-- الترحيب الطويل -->
        <div class="welcome-text">مرحباً بكم في خدمة iBOK المصرفية عبر الإنترنت</div>

        <!-- العناوين -->
        <div class="main-title"># تسجيل الدخول</div>
        <div class="sub-title">## الرجاء إدخال البيانات</div>

        <!-- نموذج الدخول -->
        <form action="#" method="POST">

            <!-- حقل رقم الحساب -->
            <div class="form-group">
                <span class="field-label">رقم الحساب:</span>
                <span class="field-hint">أدخل رقم الحساب المكون من 7 أرقام</span>
                <input type="text" placeholder="مثال: 1234567" maxlength="7" inputmode="numeric">
            </div>

            <!-- حقل كلمة المرور -->
            <div class="form-group">
                <span class="field-label">كلمة المرور:</span>
                <span class="field-hint">أدخل كلمة المرور</span>
                <input type="password" placeholder="••••••••">
            </div>

            <!-- نسبت كلمة المرور (بدون أيقونة، يمين) -->
            <a href="#" class="forgot-link">نسبت كلمة المرور</a>

            <!-- زر تسجيل الدخول -->
            <button type="submit" class="btn-login">تسجيل الدخول</button>

        </form>

        <!-- التذييل 2025 | iBOK -->
        <div class="footer">
            <span>2025</span>
            <span class="pipe">|</span>
            <strong>iBOK</strong>
        </div>

    </div>

</body>
</html>
